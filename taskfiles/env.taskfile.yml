version: "3"

tasks:
  init-env:
    desc: Copy all `*.env.*example` files to `*.env*`
    vars:
      ENV_FILES:
        sh: find . -type f -name "*.env.*example" -exec echo {} \;
    cmds:
      - for: { var: ENV_FILES, split: "\n" }
        cmd: cp -n {{ .ITEM }} $(echo {{ .ITEM }} | sed -e "s/.example$//") && chmod 766 $(echo {{ .ITEM }} | sed -e "s/.example$//")
      - echo "Environment files initialized, you may want to edit them now"
      - echo "Here are the files that were initialized:"
      - for: { var: ENV_FILES, split: "\n" }
        cmd: ls -la $(echo {{ .ITEM }} | sed -e "s/.example$//") 2>/dev/null || true
    silent: true

  clone-repos:
    desc: Clone/update repositories defined in .env (or .env.example fallback)
    cmd: ./scripts/clone-repos.sh
    silent: true
