version: "3"

vars:
  COMPOSE_DB: .docker/dev-stacks/postgresql/compose.yml
  COMPOSE_REDIS: .docker/dev-stacks/redis/compose.yml
  COMPOSE_MONITORING: .docker/dev-stacks/monitoring/compose.yml

tasks:
  boot-stack:
    desc: Generate Postgres init SQL and boot Redis + Postgres
    cmds:
      - ./scripts/generate-postgres-init.sh
      - docker compose -f {{.COMPOSE_DB}} -f {{.COMPOSE_REDIS}} --profile services up -d --remove-orphans
    silent: true

  boot-stack-ui:
    desc: Boot Redis/Postgres stack with pgAdmin + RedisInsight
    cmds:
      - ./scripts/generate-postgres-init.sh
      - docker compose -f {{.COMPOSE_DB}} -f {{.COMPOSE_REDIS}} --profile services --profile ui up -d --remove-orphans
    silent: true

  down-stack:
    desc: Stop and remove Redis + Postgres compose resources (keeps volumes)
    cmd: docker compose -f {{.COMPOSE_DB}} -f {{.COMPOSE_REDIS}} --profile services --profile ui down --remove-orphans
    silent: true

  boot-stack-monitoring:
    desc: Boot Redis/Postgres stack with monitoring (Prometheus, Loki, Grafana)
    cmds:
      - ./scripts/generate-postgres-init.sh
      - docker compose -f {{.COMPOSE_DB}} -f {{.COMPOSE_REDIS}} -f {{.COMPOSE_MONITORING}} --profile services --profile monitoring up -d --remove-orphans
    silent: true
