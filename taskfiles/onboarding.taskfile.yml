version: "3"

tasks:
  setup:
    desc: Bootstrap project for first run (env, repos, keys, infra)
    cmds:
      - task init-env
      - task clone-repos
      - task boot-stack
    silent: true

  doctor:
    desc: Check local setup health and print actionable diagnostics
    cmd: ./scripts/doctor.sh
    silent: true

  rotate-keys:
    desc: Regenerate RSA keys and reinject values in service env files
    cmd: ./scripts/sync-rsa-keys.sh
    silent: true

  pre-register-services:
    desc: Register service clients in auth-service database
    cmd: ./scripts/pre-register-services.sh
    silent: true
