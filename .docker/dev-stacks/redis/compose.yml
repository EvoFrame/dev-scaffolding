services:
  redis:
    image: redis:7-alpine
    profiles:
      - infra
    container_name: evoframe-redis
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    profiles:
      - infra-ui
    container_name: evoframe-redisinsight
    ports:
      - "127.0.0.1:${REDIS_UI_HOST_PORT:-5540}:5540"
    environment:
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_PASSWORD: "${REDIS_PASSWORD:-redis}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:latest
    profiles:
      - monitoring
    container_name: evoframe-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-redis}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
