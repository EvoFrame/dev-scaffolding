name: dev-scaffolding

services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - services
      - dev-stack
    container_name: evoframe-postgres
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${PWD}/.docker/dev-stacks/postgresql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - ui
    container_name: evoframe-pgadmin
    ports:
      - "127.0.0.1:${PGADMIN_HOST_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@local.dev}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  db_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    profiles:
      - monitoring
    container_name: evoframe-db-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
