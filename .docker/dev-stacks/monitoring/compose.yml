services:
  loki:
    image: grafana/loki:3.1.0
    profiles:
      - monitoring
    container_name: evoframe-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ${PWD}/.docker/monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.0
    profiles:
      - monitoring
    container_name: evoframe-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ${PWD}/.docker/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles:
      - monitoring
    container_name: evoframe-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ${PWD}/.docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    profiles:
      - monitoring
    container_name: evoframe-grafana
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_BASIC_ENABLED: "true"
    volumes:
      - ${PWD}/.docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
