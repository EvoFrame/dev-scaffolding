version: "3"

includes:
  env: ./taskfiles/env.taskfile.yml
  stack: ./taskfiles/stack.taskfile.yml
  full: ./taskfiles/full-stack.taskfile.yml
  clean: ./taskfiles/cleanup.taskfile.yml
  monitor: ./taskfiles/monitoring.taskfile.yml
  onboarding: ./taskfiles/onboarding.taskfile.yml

tasks:
  default:
    desc: List all available tasks
    cmd: task --list
    silent: true

  init-env:
    desc: Copy all `*.env.*example` files to `*.env*`
    aliases: [ie]
    cmd: task env:init-env
    silent: true

  clone-repos:
    desc: Clone/update repositories defined in .env (or .env.example fallback)
    aliases: [cr]
    cmd: task env:clone-repos
    silent: true

  boot-stack:
    desc: Generate Postgres init SQL and boot Redis + Postgres
    aliases: [bs]
    cmd: task stack:boot-stack
    silent: true

  boot-stack-ui:
    desc: Boot Redis/Postgres stack with pgAdmin + RedisInsight
    aliases: [bsu]
    cmd: task stack:boot-stack-ui
    silent: true

  boot-stack-monitoring:
    desc: Boot Redis/Postgres with monitoring stack
    aliases: [bsm]
    cmd: task stack:boot-stack-monitoring
    silent: true

  full-stack-up:
    desc: Build and start api-gateway/auth-service/user-service with Redis + Postgres
    aliases: [fsu]
    cmd: task full:full-stack-up
    silent: true

  full-stack-up-ui:
    desc: Build and start full stack with UIs
    aliases: [fsui]
    cmd: task full:full-stack-up-ui
    silent: true

  full-stack-up-monitoring:
    desc: Build and start full stack with monitoring
    aliases: [fsm]
    cmd: task full:full-stack-up-monitoring
    silent: true

  full-stack-down:
    desc: Stop and remove full stack containers (services + infra)
    aliases: [fsd]
    cmd: task full:full-stack-down
    silent: true

  down-stack:
    desc: Stop and remove Redis + Postgres compose resources (keeps volumes)
    aliases: [ds]
    cmd: task stack:down-stack
    silent: true

  clean-repos:
    desc: Remove cloned repositories listed in .env (or .env.example fallback)
    aliases: [clr]
    cmd: task clean:clean-repos
    silent: true

  clean-volumes:
    desc: Remove compose volumes and generated Postgres init SQL
    aliases: [clv]
    cmd: task clean:clean-volumes
    silent: true

  monitoring-up:
    desc: Start monitoring stack
    aliases: [mu]
    cmd: task monitor:monitoring-up
    silent: true

  monitoring-down:
    desc: Stop monitoring stack
    aliases: [md]
    cmd: task monitor:monitoring-down
    silent: true

  setup:
    desc: Bootstrap repository for first run
    aliases: [su]
    cmd: task onboarding:setup
    silent: true

  doctor:
    desc: Run environment and stack diagnostics
    aliases: [dr]
    cmd: task onboarding:doctor
    silent: true

  rotate-keys:
    desc: Regenerate RSA keys and reinject service env values
    aliases: [rk]
    cmd: task onboarding:rotate-keys
    silent: true

  pre-register-services:
    desc: Pre-register service clients in auth-service
    aliases: [prs]
    cmd: task onboarding:pre-register-services
    silent: true
